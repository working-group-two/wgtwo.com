---
title: Blog
layout: default
---

<div class="container padding-bottom-40">

    <div class="row">
        <div class="col-12 padding-bottom-20">
            <h1>Blog</h1>
        </div>
    </div>

    <div class="row">

        {% for post in site.posts limit:1 %}

        <div class="col-12 padding-bottom-30">
            <p><a href="{{ post.url }}" class="image" style="background-image: url('{{ post.thumbnail }}');">&nbsp;</a></p>
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            {{ post.excerpt | markdownify }}
            <p><a href="{{ post.url }}">Read more</a></p>
        </div>
        
        {% endfor %}

        {% for post in site.posts limit:100 offset:1 %}

        <div class="col-12 col-xl-4 padding-bottom-30">
            <p><a href="{{ post.url }}" class="image" style="background-image: url('{{ post.thumbnail }}');">&nbsp;</a></p>
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            {{ post.excerpt | markdownify }}
            <p><a href="{{ post.url }}">Read more</a></p>
        </div>
        
        {% endfor %}

    </div>

</div>
